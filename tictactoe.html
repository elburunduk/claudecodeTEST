<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #mode-select {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    #mode-select label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: #a8dadc;
    }

    #mode-select input { accent-color: #e94560; }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #888; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>

  <div id="mode-select">
    <label><input type="radio" name="mode" value="2p" checked> 2 Players</label>
    <label><input type="radio" name="mode" value="cpu"> vs Computer</label>
  </div>

  <div id="score">
    <div class="score-box x-score">X<span id="xWins">0</span></div>
    <div class="score-box draw-score">Draws<span id="draws">0</span></div>
    <div class="score-box o-score">O<span id="oWins">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;
    let score = { X: 0, O: 0, D: 0 };

    const cells     = document.querySelectorAll('.cell');
    const status    = document.getElementById('status');
    const restart   = document.getElementById('restart');
    const xWins     = document.getElementById('xWins');
    const oWins     = document.getElementById('oWins');
    const draws     = document.getElementById('draws');
    const modeRadios = document.querySelectorAll('input[name="mode"]');

    function isVsComputer() {
      return document.querySelector('input[name="mode"]:checked').value === 'cpu';
    }

    function init() {
      board    = Array(9).fill('');
      current  = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      status.textContent = isVsComputer() ? "Your turn (X)" : "Player X's turn";
    }

    function checkWin(player) {
      return WINS.find(combo => combo.every(i => board[i] === player)) || null;
    }

    function getEmptyIndices() {
      return board.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
    }

    function makeMove(idx, player) {
      board[idx] = player;
      cells[idx].textContent = player;
      cells[idx].classList.add('taken', player.toLowerCase());
    }

    function computerMove() {
      const empty = getEmptyIndices();
      if (empty.length === 0) return;

      let bestScore = -Infinity;
      let bestIdx = empty[0];

      for (const i of empty) {
        board[i] = 'O';
        const score = minimax(board, 0, false);
        board[i] = '';
        if (score > bestScore) {
          bestScore = score;
          bestIdx = i;
        }
      }

      makeMove(bestIdx, 'O');

      const winCombo = checkWin('O');
      if (winCombo) {
        gameOver = true;
        winCombo.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = "Computer wins!";
        score.O++;
        updateScore();
        return;
      }

      if (board.every(v => v)) {
        gameOver = true;
        status.textContent = "It's a draw!";
        score.D++;
        updateScore();
        return;
      }

      current = 'X';
      status.textContent = "Your turn (X)";
    }

    function minimax(board, depth, isMax) {
      const winX = checkWin('X');
      const winO = checkWin('O');
      const empty = getEmptyIndices();

      if (winO) return 10 - depth;
      if (winX) return depth - 10;
      if (empty.length === 0) return 0;

      if (isMax) {
        let best = -Infinity;
        for (const i of empty) {
          board[i] = 'O';
          best = Math.max(best, minimax(board, depth + 1, false));
          board[i] = '';
        }
        return best;
      } else {
        let best = Infinity;
        for (const i of empty) {
          board[i] = 'X';
          best = Math.min(best, minimax(board, depth + 1, true));
          board[i] = '';
        }
        return best;
      }
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || board[i]) return;
      if (isVsComputer() && current === 'O') return;

      makeMove(i, current);

      const winCombo = checkWin(current);
      if (winCombo) {
        gameOver = true;
        winCombo.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = isVsComputer() ? "You win! 🎉" : `Player ${current} wins! 🎉`;
        score[current]++;
        updateScore();
        return;
      }

      if (board.every(v => v)) {
        gameOver = true;
        status.textContent = "It's a draw!";
        score.D++;
        updateScore();
        return;
      }

      current = 'O';

      if (isVsComputer()) {
        status.textContent = "Computer thinking...";
        setTimeout(computerMove, 400);
      } else {
        status.textContent = "Player O's turn";
      }
    }

    function updateScore() {
      xWins.textContent = score.X;
      oWins.textContent = score.O;
      draws.textContent = score.D;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    restart.addEventListener('click', init);

    modeRadios.forEach(r => r.addEventListener('change', init));

    init();
  </script>
</body>
</html>
